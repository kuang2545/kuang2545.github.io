<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>birthday.exe — แมงปอ</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Kanit:wght@300;400;600;700&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'JetBrains Mono',monospace;background:#060f1a;cursor:crosshair;user-select:none;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9000;}

.space-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,#0d2137 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 90%,#1a3550 0%,transparent 60%),radial-gradient(ellipse 100% 100% at 50% 50%,#0a1929 0%,#060f1a 100%);}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.15;animation:orbFloat ease-in-out infinite alternate;pointer-events:none;}
@keyframes orbFloat{from{transform:translateY(-20px) scale(1);}to{transform:translateY(20px) scale(1.1);}}

canvas{position:fixed;inset:0;}
#starCanvas{z-index:1;}#matrixCanvas{z-index:2;opacity:.06;}#confCanvas{pointer-events:none;z-index:50;}

/* PHOTO WRAP — blurred + invisible on page1, clear on page2 */
.photo-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:4;
  filter:blur(18px) brightness(0.15);
  opacity:0.18;
  transition:filter 1.4s ease, opacity 1.4s ease;}
.photo-wrap.revealed{
  filter:blur(0px) brightness(1);
  opacity:1;}

.photo-circle{position:absolute;border-radius:50%;overflow:hidden;animation:floatCircle ease-in-out infinite alternate;border:2.5px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.08);box-shadow:0 4px 30px rgba(0,0,0,.4),0 0 20px rgba(120,80,255,0.15),inset 0 0 0 1px rgba(255,255,255,.12);}
.photo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.photo-circle .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2em;color:rgba(255,255,255,.25);}
@keyframes floatCircle{0%{transform:translateY(0) rotate(0deg) scale(1);}33%{transform:translateY(-22px) rotate(2deg) scale(1.02);}66%{transform:translateY(-10px) rotate(-1.5deg) scale(.98);}100%{transform:translateY(-28px) rotate(1deg) scale(1.01);}}

.crain{position:fixed;pointer-events:none;animation:rainFall linear forwards;z-index:3;}
@keyframes rainFall{0%{transform:translateY(-10px) rotate(0deg);opacity:.9;}100%{transform:translateY(110vh) rotate(680deg);opacity:0;}}
.shoot{position:fixed;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.9) 50%,transparent 100%);border-radius:2px;pointer-events:none;z-index:5;animation:shootAnim .9s linear forwards;}
@keyframes shootAnim{from{transform:translateX(0) rotate(var(--ang));opacity:1;width:0;}to{transform:translateX(240px) rotate(var(--ang));opacity:0;width:140px;}}

.page{position:fixed;inset:0;z-index:10;transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);}
.page.hidden{opacity:0;pointer-events:none;}
.page.exit-up{transform:translateY(-40px) scale(.97);opacity:0;pointer-events:none;}
.page.enter-up{transform:translateY(40px) scale(.97);}
.page.visible{opacity:1;transform:none;}

.cnt-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:8000;background:rgba(255,255,255,0.07);transition:opacity .5s;}
.cnt-fill{height:100%;background:#FFD43B;box-shadow:0 0 8px #FFD43B;width:100%;transition:width 6s cubic-bezier(0.4,0,0.2,1);}

#page1{display:flex;align-items:center;justify-content:center;padding:2rem;}

/* PYTHON.ORG DARK BLUE THEME */
.terminal{width:min(680px,92vw);background:#1e3a4f;border:1px solid #2d5a7a;border-radius:10px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.65),0 0 0 1px rgba(75,139,190,0.12);animation:termIn .7s cubic-bezier(.16,1,.3,1) both;}
@keyframes termIn{from{opacity:0;transform:translateY(24px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.titlebar{height:32px;background:#17303f;border-bottom:1px solid #2d5a7a;display:flex;align-items:center;padding:0 12px;gap:7px;}
.tdot{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:filter .15s;}
.tdot:hover{filter:brightness(1.3);}
.tbar-name{flex:1;text-align:center;font-size:11px;color:#6a96b3;letter-spacing:.02em;}
.tabs{background:#17303f;border-bottom:1px solid #2d5a7a;display:flex;padding:0 14px;}
.tab{padding:6px 14px;font-size:10px;color:#4a7090;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.02em;}
.tab.active{color:#FFD43B;border-bottom-color:#FFD43B;}
.tbody{padding:14px 18px 12px;background:#1e3a4f;}
.prog-wrap{height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.prog-bar{height:100%;width:0;background:#FFD43B;border-radius:2px;box-shadow:0 0 6px rgba(255,212,59,0.5);transition:width 0.12s ease-out;}
.code-area{display:flex;}
.gutter{min-width:32px;text-align:right;padding-right:12px;user-select:none;}
.gnum{font-size:10px;line-height:1.6;color:rgba(120,180,220,0.3);display:block;animation:fadeIn .3s both;}
.code-lines{flex:1;overflow:hidden;}
.line{font-size:11px;line-height:1.6;white-space:pre;opacity:0;transform:translateX(-8px);animation:lineIn .45s cubic-bezier(.25,1,.5,1) forwards;min-height:17.6px;}
@keyframes lineIn{0%{opacity:0;transform:translateX(-8px);}60%{opacity:1;}100%{opacity:1;transform:translateX(0);}}
@keyframes fadeIn{to{opacity:1;}}

.kw{color:#FFD43B;}
.fn{color:#4ec9b0;}
.str{color:#4db8ff;}
.num{color:#FFD43B;}
.cm{color:#6e9fb5;font-style:italic;}
.op{color:#FFD43B;}
.prop{color:#4ec9b0;}
.out{color:#5db85d;}
.plain{color:#d4e8f5;}

.output-box{margin:10px 0 0;border:1px solid rgba(255,212,59,.4);border-radius:7px;padding:9px 13px;background:#13283a;display:none;}
.out-label{font-size:10px;color:#4a7090;margin-bottom:2px;}
.out-value{font-size:16px;font-weight:700;color:#FFD43B;letter-spacing:.02em;}
.out-sub{font-size:10px;color:#4a7090;margin-top:2px;}
.actions{display:none;gap:8px;margin-top:8px;flex-wrap:wrap;}
.btn{padding:5px 13px;border-radius:6px;font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #2d5a7a;background:#17303f;color:#a0c8e0;transition:all .15s;letter-spacing:.02em;}
.btn:hover{border-color:#FFD43B;color:#FFD43B;background:rgba(255,212,59,.07);}
.btn:active{transform:scale(.97);}
.btn.pri{background:#306998;color:#fff;border-color:#4B8BBE;font-weight:700;}
.btn.pri:hover{background:#4B8BBE;}
.statusbar{background:#306998;padding:3px 12px;display:flex;align-items:center;gap:12px;font-size:10px;color:#e8f0f8;font-weight:500;}
.ssep{opacity:.4;}
@media(max-width:600px){#page1{padding:.75rem;}.terminal{width:100%;}.tbody{padding:12px 12px 10px;}.gutter{min-width:24px;padding-right:8px;}.line{font-size:10.5px;}}

#page2{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow-y:auto;}
.wish-page{position:relative;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;animation:wishPageIn .8s cubic-bezier(.16,1,.3,1) both;}
@keyframes wishPageIn{from{opacity:0;transform:translateY(30px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.wish-cake{font-size:clamp(64px,16vw,88px);line-height:1;margin-bottom:1.4rem;animation:bigCake 2.8s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(255,200,80,.7));display:inline-block;}
@keyframes bigCake{0%,100%{transform:translateY(0) scale(1) rotate(-2deg);}50%{transform:translateY(-14px) scale(1.04) rotate(2deg);}}
.wish-age-badge{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:#5bb974;background:rgba(91,185,116,0.1);border:1px solid rgba(91,185,116,0.3);padding:4px 16px;border-radius:20px;letter-spacing:.1em;margin-bottom:1.2rem;animation:glowBadge 2s ease-in-out infinite;}
@keyframes glowBadge{0%,100%{box-shadow:none;}50%{box-shadow:0 0 16px rgba(91,185,116,0.3);}}
.wish-label{font-family:'Mitr',sans-serif;font-size:clamp(14px,4vw,16px);color:rgba(200,180,255,.85);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.5rem;}
.wish-name{font-family:'Kanit',sans-serif;font-size:clamp(44px,12vw,70px);font-weight:700;background:linear-gradient(135deg,#ffd670 0%,#ff9de2 45%,#a8c8ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:.3rem;}
.wish-fullname{font-family:'Kanit',sans-serif;font-size:clamp(14px,3.5vw,17px);font-weight:300;color:rgba(255,255,255,.5);letter-spacing:.06em;margin-bottom:2.2rem;}
.tap-hint-p2{position:fixed;bottom:1.5rem;font-family:'Mitr',sans-serif;font-size:11px;color:rgba(255,255,255,.2);letter-spacing:.1em;animation:pulseHint 2.5s ease-in-out infinite;pointer-events:none;}
@keyframes pulseHint{0%,100%{opacity:.25;}50%{opacity:.7;}}
.toast{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(20,10,50,.92);border:1px solid rgba(255,200,150,.3);color:#ffd670;font-family:'Mitr',sans-serif;font-size:14px;padding:10px 22px;border-radius:50px;backdrop-filter:blur(12px);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);z-index:200;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="space-bg">
  <div class="orb" style="width:350px;height:350px;background:#1a3a5c;top:-80px;left:-100px;animation-duration:7s;"></div>
  <div class="orb" style="width:280px;height:280px;background:#0d2137;bottom:-60px;right:-80px;animation-duration:9s;animation-delay:-4s;"></div>
  <div class="orb" style="width:200px;height:200px;background:#2d1b69;top:45%;left:35%;animation-duration:8s;animation-delay:-2s;"></div>
</div>
<canvas id="starCanvas"></canvas>
<canvas id="matrixCanvas"></canvas>
<canvas id="confCanvas"></canvas>
<div class="photo-wrap" id="photoWrap"></div>
<div class="cnt-bar" id="cntBar"><div class="cnt-fill" id="cntFill"></div></div>

<!-- PAGE 1 -->
<div class="page visible" id="page1">
  <div class="terminal">
    <div class="titlebar">
      <div class="tdot" style="background:#ff5f57"></div>
      <div class="tdot" style="background:#ffbd2e"></div>
      <div class="tdot" style="background:#28c840"></div>
      <div class="tbar-name">birthday.py — Python 3.12.0</div>
    </div>
    <div class="tabs">
      <div class="tab active">birthday.py</div>
      <div class="tab">confetti.js</div>
      <div class="tab">space.css</div>
    </div>
    <div class="tbody">
      <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
      <div class="code-area">
        <div class="gutter" id="gutter"></div>
        <div class="code-lines" id="codeLines"></div>
      </div>
      <div class="output-box" id="outBox">
        <div class="out-label">// stdout:</div>
        <div class="out-value">🎂 HBD แมงปอ! อายุ 23 แล้วนะ</div>
        <div class="out-sub">exit code 0 · runtime: 0.003s ✓</div>
      </div>
      <div class="actions" id="actions">
        <button class="btn pri" onclick="rerun()">▶ Run again</button>
        <button class="btn" onclick="burstAll()">🎉 burst()</button>
        <button class="btn" onclick="addWish()">// wish</button>
      </div>
    </div>
    <div class="statusbar">
      <span>● Python</span><span class="ssep">|</span>
      <span>UTF-8</span><span class="ssep">|</span>
      <span>Ln <span id="lnNum">1</span></span><span class="ssep">|</span>
      <span id="statusTxt">running...</span>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page hidden" id="page2">
  <div class="wish-page">
    <div class="wish-cake">🎂</div>
    <div class="wish-age-badge">age = 23  // 13 Apr 2026 🎉</div>
    <div class="wish-label">สุขสันต์วันเกิด</div>
    <div class="wish-name">แมงปอ</div>
    <div class="wish-fullname">Watcharobon Silasai ✨</div>
  </div>
  <div class="tap-hint-p2">✦ แตะหน้าจอเพื่อ confetti ✦</div>
</div>

<div class="toast" id="toast"></div>

<script>
const sc=document.getElementById('starCanvas'),sctx=sc.getContext('2d');let stars=[];
function initStars(){sc.width=window.innerWidth;sc.height=window.innerHeight;stars=Array.from({length:180},()=>({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.6+.2,a:Math.random(),da:(Math.random()*.007+.002)*(Math.random()>.5?1:-1),twinkle:Math.random()>.5}));requestAnimationFrame(drawStars);}
function drawStars(){sctx.clearRect(0,0,sc.width,sc.height);stars.forEach(s=>{if(s.twinkle){s.a+=s.da;if(s.a>1||s.a<.05)s.da*=-1;}sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fillStyle=`rgba(255,255,255,${s.a.toFixed(2)})`;sctx.fill();});requestAnimationFrame(drawStars);}
initStars();window.addEventListener('resize',initStars);

const mc=document.getElementById('matrixCanvas'),mctx=mc.getContext('2d');mc.width=window.innerWidth;mc.height=window.innerHeight;
const matC='アイウエオカキクケコサシスセソタチツ01βγδ'.split('');const mF=13;let mD=Array(Math.floor(mc.width/mF)).fill(1);
setInterval(()=>{mctx.fillStyle='rgba(6,10,18,.05)';mctx.fillRect(0,0,mc.width,mc.height);mctx.fillStyle='#4B8BBE';mctx.font=mF+'px monospace';mD.forEach((y,i)=>{mctx.fillText(matC[Math.floor(Math.random()*matC.length)],i*mF,y*mF);if(y*mF>mc.height&&Math.random()>.975)mD[i]=0;mD[i]++;});},65);

const cc=document.getElementById('confCanvas'),cctx=cc.getContext('2d');let pieces=[];
const CCOLS=['#ffd670','#ff9de2','#a8c8ff','#7efff5','#ffa07a','#c3b1e1','#90ee90','#FFD43B'];
cc.width=window.innerWidth;cc.height=window.innerHeight;window.addEventListener('resize',()=>{cc.width=window.innerWidth;cc.height=window.innerHeight;});
function burstAt(x,y,n=50){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*8;pieces.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(2+Math.random()*5),w:4+Math.random()*8,h:4+Math.random()*8,rot:Math.random()*360,drot:(Math.random()-.5)*14,color:CCOLS[Math.floor(Math.random()*CCOLS.length)],life:1,shape:Math.random()>.45?'rect':'circle'});}}
function animC(){cctx.clearRect(0,0,cc.width,cc.height);pieces=pieces.filter(p=>p.life>.02);pieces.forEach(p=>{p.vy+=.2;p.x+=p.vx;p.y+=p.vy;p.vx*=.99;p.rot+=p.drot;p.life-=.013;cctx.save();cctx.globalAlpha=Math.min(p.life*2,1);cctx.translate(p.x,p.y);cctx.rotate(p.rot*Math.PI/180);cctx.fillStyle=p.color;if(p.shape==='circle'){cctx.beginPath();cctx.arc(0,0,p.w/2,0,Math.PI*2);cctx.fill();}else cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cctx.restore();});requestAnimationFrame(animC);}
animC();
function burstAll(){for(let i=0;i<6;i++)setTimeout(()=>burstAt(Math.random()*window.innerWidth,Math.random()*window.innerHeight,40),i*100);}

const RC=['#ffd670','#ff9de2','#a8c8ff','#c3b1e1','#7efff5','#ffa07a'];
function spawnR(){const el=document.createElement('div');el.className='crain';const sz=4+Math.random()*7,d=4.5+Math.random()*5;el.style.cssText=`width:${sz}px;height:${sz}px;background:${RC[Math.floor(Math.random()*RC.length)]};left:${Math.random()*100}%;top:-10px;animation-duration:${d}s;animation-delay:${Math.random()*3}s;border-radius:${Math.random()>.5?'50%':'1px'};opacity:.75;`;document.body.appendChild(el);setTimeout(()=>el.remove(),(d+3)*1000);}
for(let i=0;i<20;i++)spawnR();setInterval(spawnR,380);

function spawnS(){const el=document.createElement('div');el.className='shoot';el.style.left=(Math.random()*window.innerWidth*.6)+'px';el.style.top=(Math.random()*window.innerHeight*.35)+'px';el.style.setProperty('--ang',(10+Math.random()*20)+'deg');document.body.appendChild(el);setTimeout(()=>el.remove(),900);}
setInterval(spawnS,4200);setTimeout(spawnS,1800);

/* PHOTO CIRCLES — load immediately but visually hidden via CSS blur */
(function(){
  const IDS=["1FpoC_tFJXdUrZcSCnD8YJhXDjdo3QVgC","1mBnqEmdtaA9MXJAGMpl1UN40RSEKKkbF","1AGlG1NVtJocTCpv68YHl7fSyJ-VWdsQP","1TEy7RaMhm7z5yISMD8YuuPNvhZlEEKlM","1hG9OxbALGAIJuTuIpIQO5NOaqFaRnbTj","1zqCHWFg3rwE8bgQ8M2EcyMkMuEmksCow","1YEFTj3m2mlctLV_WaXQxks3IBCtObU_I","1EH9YI9pfq-HLqCskMbubciEu0LJAF5J7","1MzlTNisVJfHWHxGI3hZ1GFBOUY-nRN7G"];
  const SLOTS=[{sz:"110px",pos:"top:6%;left:3%",dur:"6s",del:"0s"},{sz:"95px",pos:"top:4%;left:28%",dur:"7.5s",del:"-1s"},{sz:"130px",pos:"top:2%;right:4%",dur:"8s",del:"-2s"},{sz:"80px",pos:"top:35%;left:1%",dur:"5.5s",del:"-0.5s"},{sz:"105px",pos:"top:40%;right:2%",dur:"7s",del:"-3s"},{sz:"120px",pos:"bottom:8%;left:5%",dur:"6.5s",del:"-1.5s"},{sz:"88px",pos:"bottom:12%;left:38%",dur:"9s",del:"-2.5s"},{sz:"108px",pos:"bottom:6%;right:4%",dur:"7s",del:"-4s"},{sz:"90px",pos:"top:20%;right:20%",dur:"8.5s",del:"-3.5s"}];
  const shuffled=[...IDS].sort(()=>Math.random()-.5);
  const wrap=document.getElementById('photoWrap');
  SLOTS.forEach((s,i)=>{
    const url=`https://lh3.googleusercontent.com/d/${shuffled[i]}`;
    const div=document.createElement('div');div.className='photo-circle';
    div.style.cssText=`width:${s.sz};height:${s.sz};${s.pos};animation-duration:${s.dur};animation-delay:${s.del};`;
    div.innerHTML=`<img src="${url}" alt="" onerror="this.parentNode.innerHTML='<div class=ph>🌟</div>'">`;
    wrap.appendChild(div);
  });
})();

document.body.addEventListener('click',e=>{if(e.target.closest('.btn'))return;burstAt(e.clientX,e.clientY,45);});
document.body.addEventListener('touchstart',e=>{Array.from(e.touches).forEach(t=>burstAt(t.clientX,t.clientY,30));},{passive:true});
let lA={x:0,y:0,z:0},lS=0;
if(window.DeviceMotionEvent)window.addEventListener('devicemotion',e=>{const a=e.accelerationIncludingGravity;if(!a)return;const d=Math.abs(a.x-lA.x)+Math.abs(a.y-lA.y)+Math.abs(a.z-lA.z);if(d>22&&Date.now()-lS>1200){lS=Date.now();burstAll();showToast('🎉 HBD แมงปอ! 23 แล้วนะ!');}lA={x:a.x,y:a.y,z:a.z};});

const toastEl=document.getElementById('toast');let toastT;
function showToast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),3000);}

let onP2=false;
function goToPage2(){
  if(onP2)return;onP2=true;
  document.getElementById('cntBar').style.opacity='0';
  /* reveal photos when transitioning to page 2 */
  document.getElementById('photoWrap').classList.add('revealed');
  const p1=document.getElementById('page1'),p2=document.getElementById('page2');
  p1.classList.remove('visible');p1.classList.add('exit-up');
  setTimeout(()=>{
    p1.classList.add('hidden');p2.classList.remove('hidden');p2.classList.add('enter-up');
    p2.getBoundingClientRect();p2.classList.remove('enter-up');p2.classList.add('visible');
    setTimeout(()=>burstAll(),300);setTimeout(()=>burstAt(window.innerWidth/2,window.innerHeight*.3,80),600);
  },750);
}

const cntFill=document.getElementById('cntFill');
let cntStart=null,cntDone=false;
requestAnimationFrame(()=>requestAnimationFrame(()=>{cntFill.style.width='0%';}));
function tickCnt(ts){if(!cntStart)cntStart=ts;const frac=Math.min((ts-cntStart)/6000,1);if(frac>=1&&!cntDone){cntDone=true;goToPage2();return;}if(!cntDone)requestAnimationFrame(tickCnt);}
setTimeout(()=>requestAnimationFrame(tickCnt),100);

const LINES=[
  {d:0,   h:'<span class="cm"># ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>'},
  {d:80,  h:'<span class="cm">#  birthday.py  —  made with ❤️ + caffeine</span>'},

const clEl=document.getElementById('codeLines'),gtEl=document.getElementById('gutter');
const outBox=document.getElementById('outBox'),actEl=document.getElementById('actions');
const progBar=document.getElementById('progBar'),lnNum=document.getElementById('lnNum'),statusTxt=document.getElementById('statusTxt');
function renderTerminal(){
  clEl.innerHTML='';gtEl.innerHTML='';
  LINES.forEach((l,i)=>{
    const div=document.createElement('div');div.className='line';
    div.innerHTML=l.h||'&nbsp;';div.style.animationDelay=l.d+'ms';clEl.appendChild(div);
    const gn=document.createElement('span');gn.className='gnum';
    gn.textContent=i+1;gn.style.animationDelay=(l.d+80)+'ms';gtEl.appendChild(gn);
  });
  const maxD=Math.max(...LINES.map(l=>l.d));
  LINES.forEach((l,i)=>{setTimeout(()=>{lnNum.textContent=i+1;progBar.style.width=Math.round(((i+1)/LINES.length)*80)+'%';},l.d);});
  setTimeout(()=>{
    progBar.style.width='100%';statusTxt.textContent='exit code 0 ✓';
    outBox.style.display='block';actEl.style.display='flex';
    setTimeout(()=>burstAt(window.innerWidth/2,window.innerHeight/2,55),150);
  },maxD+300);
}
function rerun(){outBox.style.display='none';actEl.style.display='none';progBar.style.width='0';statusTxt.textContent='running...';renderTerminal();}
function addWish(){const w=prompt('// enter your wish:');if(!w)return;const el=document.createElement('div');el.className='line';el.style.opacity='1';el.style.transform='none';el.innerHTML=`<span class="cm">// </span><span class="str">"${w}"</span> <span class="out">✓</span>`;clEl.appendChild(el);lnNum.textContent=parseInt(lnNum.textContent)+1;burstAt(window.innerWidth/2,window.innerHeight/2,50);showToast('💌 wish saved!');}
renderTerminal();
setTimeout(()=>burstAt(window.innerWidth/2,window.innerHeight/2,50),500);
